<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biplav Sitaula — Frontend Developer</title>
    <link rel="icon" type="image" href="/public/BS.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --black: #000;
        --green: #00ff00;
        --green-dim: #00cc00;
        --green-muted: rgba(0, 255, 0, 0.06);
        --green-border: rgba(0, 255, 0, 0.18);
        --white: #efefef;
        --gray: #6e6e6e;
        --font-display: system-ui, "Segoe UI", sans-serif;
        --font-mono: "Courier New", Courier, monospace;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--black);
        color: var(--white);
        font-family: var(--font-mono);
        overflow-x: hidden;
        cursor: none;
      }

      /* cursor */
      #cur {
        position: fixed;
        width: 10px;
        height: 10px;
        background: var(--green);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        mix-blend-mode: difference;
        transition:
          width 0.15s,
          height 0.15s;
      }
      #cur-ring {
        position: fixed;
        width: 34px;
        height: 34px;
        border: 1px solid rgba(0, 255, 0, 0.35);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
      }
      body:has(a:hover) #cur,
      body:has(button:hover) #cur {
        width: 18px;
        height: 18px;
      }

      /* scanlines */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.022) 2px,
          rgba(0, 0, 0, 0.022) 4px
        );
        pointer-events: none;
        z-index: 8000;
      }

      /* nav */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        padding: 1.1rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--green-border);
        background: rgba(0, 0, 0, 0.94);
        backdrop-filter: blur(14px);
      }
      .logo {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 1.1rem;
        color: var(--green);
        cursor: none;
        letter-spacing: 1px;
        user-select: none;
      }
      .nav-links {
        margin-inline: auto;
        display: flex;
        gap: 1.75rem;
        list-style: none;
      }
      .nav-links button {
        background: none;
        border: none;
        color: var(--gray);
        font-family: var(--font-mono);
        font-size: 0.68rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: none;
        transition: color 0.2s;
        position: relative;
        padding: 0;
      }
      .nav-links button::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--green);
        transition: width 0.28s;
      }
      .nav-links button:hover,
      .nav-links button.active {
        color: var(--green);
      }
      .nav-links button.active::after,
      .nav-links button:hover::after {
        width: 100%;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.6rem;
        color: var(--green);
        letter-spacing: 1px;
      }
      .dot {
        width: 6px;
        height: 6px;
        background: var(--green);
        border-radius: 50%;
        animation: pulse 1.6s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }

      /* page */
      .page {
        min-height: 100vh;
        padding-top: 3.8rem;
        animation: fadeUp 0.32s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* hero */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 5rem 2.5rem 4rem;
        position: relative;
        overflow: hidden;
      }
      .hero-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
        background-size: 54px 54px;
        pointer-events: none;
      }
      .hero-tag {
        font-size: 0.63rem;
        letter-spacing: 4px;
        color: var(--green);
        text-transform: uppercase;
        margin-bottom: 1.4rem;
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }
      .hero-tag::before {
        content: "";
        width: 34px;
        height: 1px;
        background: var(--green);
      }
      .hero-title {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: clamp(3.2rem, 9vw, 7.5rem);
        line-height: 0.92;
        letter-spacing: -3px;
        margin-bottom: 1.25rem;
      }
      .hero-title .name {
        color: var(--green);
        display: block;
      }
      .hero-title .role {
        color: var(--white);
        display: block;
      }
      .hero-sub {
        font-size: 0.8rem;
        color: var(--gray);
        max-width: 490px;
        line-height: 1.88;
        margin-bottom: 2.4rem;
      }
      .hero-sub em {
        color: var(--green);
        font-style: normal;
      }
      .hero-btns {
        display: flex;
        gap: 0.9rem;
        flex-wrap: wrap;
      }

      /* buttons */
      .btn {
        padding: 0.68rem 1.5rem;
        font-family: var(--font-mono);
        font-size: 0.68rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        cursor: none;
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        transition: all 0.2s;
        text-decoration: none;
      }
      .btn-green {
        background: var(--green);
        color: #000;
        font-weight: 700;
      }
      .btn-green:hover {
        background: var(--green-dim);
        transform: translateY(-2px);
      }
      .btn-outline {
        border: 1px solid var(--green-border);
        color: var(--green);
        background: transparent;
      }
      .btn-outline:hover {
        background: var(--green-muted);
        border-color: var(--green);
      }

      /* floating stack pills */
      .hero-tech {
        position: absolute;
        right: 2.5rem;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }
      .pill {
        padding: 0.32rem 0.8rem;
        border: 1px solid var(--green-border);
        font-size: 0.58rem;
        color: var(--green);
        letter-spacing: 1px;
        background: var(--green-muted);
      }

      /* scroll hint */
      .scroll-hint {
        position: absolute;
        bottom: 2rem;
        left: 2.5rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.58rem;
        color: var(--gray);
        letter-spacing: 2px;
      }
      .scroll-line {
        width: 1px;
        height: 42px;
        background: var(--green);
        animation: sA 1.6s ease-in-out infinite;
      }
      @keyframes sA {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.18;
        }
      }

      /* sections */
      section {
        padding: 5rem 2.5rem;
      }
      .sec-label {
        font-size: 0.6rem;
        letter-spacing: 4px;
        color: var(--green);
        text-transform: uppercase;
        margin-bottom: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .sec-label::before {
        content: "";
        width: 26px;
        height: 1px;
        background: var(--green);
      }
      .sec-title {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: clamp(1.9rem, 5vw, 3.6rem);
        line-height: 1;
        letter-spacing: -1.5px;
        margin-bottom: 2.5rem;
      }
      .sec-title em {
        color: var(--green);
        font-style: normal;
      }
      .divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 0, 0.22),
          transparent
        );
      }

      /* skills */
      .skills-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }
      .skill {
        padding: 0.45rem 0.95rem;
        border: 1px solid var(--green-border);
        font-size: 0.66rem;
        color: var(--white);
        letter-spacing: 1px;
        transition: all 0.2s;
      }
      .skill:hover {
        background: var(--green-muted);
        border-color: var(--green);
        color: var(--green);
      }
      .skill-group {
        margin-bottom: 2rem;
      }
      .skill-group-label {
        font-size: 0.58rem;
        letter-spacing: 3px;
        color: var(--gray);
        text-transform: uppercase;
        margin-bottom: 0.7rem;
      }

      /* experience */
      .exp-list {
        display: flex;
        flex-direction: column;
        gap: 1.6rem;
        max-width: 800px;
      }
      .exp-card {
        padding: 1.65rem;
        border: 1px solid var(--green-border);
        background: var(--green-muted);
        position: relative;
        transition: border-color 0.25s;
      }
      .exp-card:hover {
        border-color: rgba(0, 255, 0, 0.5);
      }
      .exp-card::before {
        content: "";
        position: absolute;
        top: -1px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--green);
        transition: width 0.38s;
      }
      .exp-card:hover::before {
        width: 100%;
      }
      .exp-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.85rem;
      }

      .exp-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1rem;
        color: var(--white);
      }
      .exp-co {
        color: var(--green);
        font-size: 0.68rem;
        letter-spacing: 1px;
        margin-top: 0.18rem;
      }
      .exp-date {
        font-size: 0.58rem;
        color: var(--gray);
        letter-spacing: 1px;
        padding: 0.26rem 0.62rem;
        border: 1px solid var(--green-border);
        white-space: nowrap;
        align-self: flex-start;
      }
      .exp-ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.42rem;
        margin-bottom: 0.85rem;
      }
      .exp-ul li {
        font-size: 0.74rem;
        color: var(--gray);
        line-height: 1.78;
        padding-left: 1rem;
        position: relative;
      }
      .exp-ul li::before {
        content: "▸";
        position: absolute;
        left: 0;
        color: var(--green);
      }
      .exp-stack {
        font-size: 0.6rem;
        color: var(--green);
        letter-spacing: 1px;
        border-top: 1px solid var(--green-border);
        padding-top: 0.65rem;
      }

      /* projects */
      .proj-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 1.15rem;
      }
      .proj-card {
        padding: 1.65rem;
        border: 1px solid var(--green-border);
        background: var(--green-muted);
        position: relative;
        overflow: hidden;
        transition: all 0.25s;
      }
      .proj-card:hover {
        border-color: rgba(0, 255, 0, 0.5);
        transform: translateY(-3px);
      }
      .proj-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(0, 255, 0, 0.04), transparent);
        opacity: 0;
        transition: opacity 0.28s;
        pointer-events: none;
      }
      .proj-card:hover::after {
        opacity: 1;
      }
      .proj-num {
        font-size: 0.58rem;
        color: var(--green);
        letter-spacing: 2px;
        margin-bottom: 0.6rem;
      }
      .proj-name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--white);
        margin-bottom: 0.6rem;
      }
      .proj-desc {
        font-size: 0.73rem;
        color: var(--gray);
        line-height: 1.78;
        margin-bottom: 1rem;
      }
      .proj-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.32rem;
      }
      .tag {
        padding: 0.18rem 0.52rem;
        background: rgba(0, 255, 0, 0.08);
        border: 1px solid rgba(0, 255, 0, 0.22);
        font-size: 0.56rem;
        color: var(--green);
        letter-spacing: 0.5px;
      }
      .proj-arrow {
        position: absolute;
        top: 1.35rem;
        right: 1.35rem;
        color: var(--green);
        font-size: 0.9rem;
        opacity: 0;
        transition: all 0.22s;
        transform: translate(-4px, 4px);
      }
      .proj-card:hover .proj-arrow {
        opacity: 1;
        transform: translate(0, 0);
      }

      /* about */
      .about-wrap {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 3.5rem;
        align-items: start;
        max-width: 860px;
      }
      .about-avatar {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid var(--green-border);
        background: var(--green-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 3.5rem;
        color: var(--green);
        letter-spacing: -2px;
        flex-shrink: 0;
      }
      .about-avatar::after {
        content: "";
        position: absolute;
        top: 9px;
        left: 9px;
        right: -9px;
        bottom: -9px;
        border: 1px solid rgba(0, 255, 0, 0.22);
        pointer-events: none;
      }
      .about-text p {
        font-size: 0.78rem;
        color: var(--gray);
        line-height: 1.92;
        margin-bottom: 0.85rem;
      }
      .about-text em {
        color: var(--green);
        font-style: normal;
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.85rem;
        margin-top: 1.6rem;
      }
      .stat {
        padding: 1rem;
        border: 1px solid var(--green-border);
        background: var(--green-muted);
      }
      .stat-n {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 1.9rem;
        color: var(--green);
      }
      .stat-l {
        font-size: 0.58rem;
        color: var(--gray);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-top: 0.18rem;
      }
      .edu-box {
        margin-top: 2rem;
        padding: 1.2rem 1.5rem;
        border: 1px solid var(--green-border);
        background: var(--green-muted);
        max-width: 860px;
      }
      .edu-label {
        font-size: 0.58rem;
        color: var(--green);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 0.4rem;
      }
      .edu-name {
        font-size: 0.82rem;
        color: var(--white);
        line-height: 1.6;
      }
      .edu-deg {
        font-size: 0.7rem;
        color: var(--gray);
        margin-top: 0.2rem;
      }
      .interests {
        margin-top: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }
      .interest-tag {
        padding: 0.28rem 0.7rem;
        border: 1px solid var(--green-border);
        font-size: 0.6rem;
        color: var(--gray);
        letter-spacing: 1px;
      }

      /* contact */
      .contact-wrap {
        max-width: 560px;
      }
      .contact-intro {
        font-size: 0.8rem;
        color: var(--gray);
        line-height: 1.88;
        margin-bottom: 1.65rem;
        max-width: 440px;
      }
      .contact-email {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: clamp(1.3rem, 3.5vw, 2.5rem);
        color: var(--green);
        text-decoration: none;
        display: block;
        margin-bottom: 0.6rem;
        word-break: break-all;
      }
      .contact-phone {
        font-size: 0.8rem;
        color: var(--gray);
        margin-bottom: 2rem;
        letter-spacing: 1px;
      }
      .contact-phone em {
        color: var(--green);
        font-style: normal;
      }
      .socials {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 2.25rem;
      }
      .soc {
        display: flex;
        align-items: center;
        gap: 0.48rem;
        color: var(--gray);
        text-decoration: none;
        font-size: 0.7rem;
        letter-spacing: 1px;
        padding: 0.42rem 0.6rem;
        border: 1px solid transparent;
        transition: all 0.2s;
      }
      .soc:hover {
        color: var(--green);
        border-color: var(--green-border);
      }
      .soc-icon {
        width: 24px;
        height: 24px;
        border: 1px solid var(--green-border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.48rem;
        color: var(--green);
        flex-shrink: 0;
      }

      select.version-select {
        margin-left: auto;
        margin-right: 1em;
        background: #111;
        color: #fff;
        border: 1px solid #333;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        cursor: pointer;
      }

      select.version-select option {
        background: #111;
        color: #fff;
      }

      /* footer */
      footer {
        border-top: 1px solid var(--green-border);
        padding: 1.6rem 2.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.7rem;
      }
      footer p {
        font-size: 0.6rem;
        color: var(--gray);
        letter-spacing: 1px;
      }
      footer em {
        color: var(--green);
        font-style: normal;
      }

      /* blink */
      .blink {
        animation: blink 0.85s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* animation safety — never hidden by default */
      .skill-group,
      .skill,
      .exp-card,
      .proj-card {
        opacity: 1;
      }

      /* responsive */
      @media (max-width: 900px) {
        .hero-tech {
          display: none;
        }
      }
      @media (max-width: 768px) {
        .about-wrap {
          grid-template-columns: 1fr;
        }
        .about-avatar {
          display: none;
        }
        section {
          padding: 3.5rem 1.5rem;
        }
        nav {
          padding: 1rem 1.5rem;
        }
      }
      @media (max-width: 480px) {
        .nav-links {
          gap: 1rem;
        }
        .hero {
          padding: 5rem 1.5rem 3rem;
        }
        .hero-title {
          letter-spacing: -1.5px;
        }
      }
    </style>
  </head>
  <body>
    <div id="cur"></div>
    <div id="cur-ring"></div>
    <div id="root"></div>

    <script>
      (function () {
        var c = document.getElementById("cur"),
          r = document.getElementById("cur-ring");
        var mx = 0,
          my = 0,
          rx = 0,
          ry = 0;
        document.addEventListener("mousemove", function (e) {
          mx = e.clientX;
          my = e.clientY;
          c.style.left = mx + "px";
          c.style.top = my + "px";
        });
        function loop() {
          rx += (mx - rx) * 0.1;
          ry += (my - ry) * 0.1;
          r.style.left = rx + "px";
          r.style.top = ry + "px";
          requestAnimationFrame(loop);
        }
        loop();
      })();
    </script>

    <script>
      window.addEventListener("load", function () {
        var React = window.React,
          ReactDOM = window.ReactDOM,

            '<p style="color:#0f0;padding:2rem;font-family:monospace">Scripts failed — please refresh.</p>';
          return;
        }
        gsap.registerPlugin(window.ScrollTrigger);
        var h = React.createElement,
          useState = React.useState,
          useEffect = React.useEffect,
          useRef = React.useRef,
          Fragment = React.Fragment;

        // ── DATA (from CV) ────────────────────────────────────────────────────
        var SKILL_GROUPS = [
          {
            label: "Languages",
            skills: ["TypeScript", "JavaScript", "HTML5", "CSS3"],
          },
          {
            label: "Frameworks & Libraries",
            skills: [
              "React",
              "Next.js",
              "Redux",
              "TailwindCSS",
              "SCSS",
              "Node.js",
              "Express",
              "Vite",
              "Shadcn/ui",
            ],
          },
          {
            label: "CMS & Tools",
            skills: [
              "WordPress",
              "Chrome DevTools",
              "VS Debugger",
              "ClickUp",
              "Slack",

            return function () {
              window.removeEventListener("popstate", fn);
            };
          }, []);

            window.history.pushState({}, "", path);
            s[1](path);
            window.scrollTo(0, 0);
          }

          return [s[0], navigate];
